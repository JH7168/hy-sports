<script>
  // =========================================================================
  // 전역 변수 모음
  // =========================================================================
  let currentUser = null;
  let verifiedStudentName = "";
  let cachedGradeStats = null;
  let activeGradeTab = "1";
  let papsRadarChartInstance = null;
  let papsTargetId = "";

  // =========================================================================
  // 초기화 및 이벤트 리스너
  // =========================================================================
  window.onload = function() {
    const classSelect = document.getElementById('reg-class');
    const numSelect = document.getElementById('reg-num');
    if (classSelect) { for(let i=1; i<=8; i++) classSelect.innerHTML += `<option value="${i}">${i}반</option>`; }
    if (numSelect) { for(let i=1; i<=25; i++) numSelect.innerHTML += `<option value="${i}">${i}번</option>`; }

    function handleLoginEnter(event) { if (event.key === 'Enter') attemptLogin(); }
    document.getElementById('login-id')?.addEventListener('keypress', handleLoginEnter);
    document.getElementById('login-pw')?.addEventListener('keypress', handleLoginEnter);

    function handleSignupEnter(event) { if (event.key === 'Enter') attemptSignup(); }
    document.getElementById('reg-pw')?.addEventListener('keypress', handleSignupEnter);
    document.getElementById('reg-pw-confirm')?.addEventListener('keypress', handleSignupEnter);
    document.getElementById('reg-secret')?.addEventListener('keypress', handleSignupEnter);
  };

  // =========================================================================
  // 공통 UI / 모달 제어 함수
  // =========================================================================
  function showAlert(msg) { 
    const alertBox = document.getElementById('customAlert'); const alertMsg = document.getElementById('customAlertMessage');
    if (alertMsg && alertBox) { alertMsg.innerHTML = msg.replace(/\n/g, '<br>'); alertBox.classList.remove('hidden'); } else { alert(msg); }
  }
  function closeAlert() { document.getElementById('customAlert')?.classList.add('hidden'); }

  function showConfirm(msg, yesCallback) {
    let confirmBox = document.getElementById('customConfirm');
    if(!confirmBox) {
      confirmBox = document.createElement('div'); confirmBox.id = 'customConfirm'; confirmBox.className = 'custom-modal-overlay hidden';
      confirmBox.innerHTML = '<div class="custom-modal-box"><div id="customConfirmMessage" class="custom-modal-text" style="margin-bottom:20px; font-size:1.05em; color:#333; line-height:1.5; word-break:keep-all;"></div><div style="display:flex; gap:10px;"><button class="custom-modal-btn" id="confirm-yes-btn" style="background:#1e3c72; flex:1;">확인</button><button class="custom-modal-btn" onclick="document.getElementById(\'customConfirm\').classList.add(\'hidden\')" style="background:#ccc; color:#333; flex:1;">취소</button></div></div>';
      document.body.appendChild(confirmBox);
    }
    document.getElementById('customConfirmMessage').innerHTML = msg; confirmBox.classList.remove('hidden');
    document.getElementById('confirm-yes-btn').onclick = function() { confirmBox.classList.add('hidden'); if(yesCallback) yesCallback(); };
  }

  function toggleView(viewId) {
    document.getElementById('login-view')?.classList.add('hidden'); document.getElementById('signup-view')?.classList.add('hidden');
    document.getElementById('main-view')?.classList.add('hidden'); document.getElementById('pe-main-view')?.classList.add('hidden');
    document.getElementById(viewId)?.classList.remove('hidden'); window.scrollTo(0, 0);
  }

  function switchTab(tabName, parentId = null) {
    const tabs = ['home', 'paps', 'sports', 'friendly', 'sportsclub-soccer', 'sportsclub-basketball', 'sportsclub-volleyball', 'sportsclub-badminton', 'afterschool-main', 'afterschool-small', 'lunch-gym', 'lunch-field', 'lunch-futsal'];
    tabs.forEach(t => { const content = document.getElementById('content-' + t); if(content) content.classList.add('hidden'); });
    const mainTabs = ['tab-home', 'tab-paps', 'tab-sports', 'tab-friendly', 'tab-sportsclub', 'tab-afterschool', 'tab-lunch'];
    mainTabs.forEach(t => { const tab = document.getElementById(t); if(tab) tab.classList.remove('active'); });
    const targetContent = document.getElementById('content-' + tabName); if(targetContent) targetContent.classList.remove('hidden');
    if (parentId) { const p = document.getElementById(parentId); if (p) p.classList.add('active'); } else { const t = document.getElementById('tab-' + tabName); if(t) t.classList.add('active'); }
    window.scrollTo(0, 0); 
  }

  function openPETeacherView() { document.getElementById('main-view')?.classList.add('hidden'); document.getElementById('pe-main-view')?.classList.remove('hidden'); switchPETab('pe-home'); }
  function closePETeacherView() { document.getElementById('pe-main-view')?.classList.add('hidden'); document.getElementById('main-view')?.classList.remove('hidden'); switchTab('home'); }

  // ★ 물품관리 하위 메뉴 처리 추가
  function switchPETab(peTabName) {
    const peTabs = ['pe-home', 'pe-inventory-status', 'pe-purchase-list', 'pe-paps-manage', 'pe-sports-manage', 'pe-lunch-manage', 'pe-board-manage'];
    peTabs.forEach(t => { const c = document.getElementById('content-' + t); if(c) c.classList.add('hidden'); });
    
    // 버튼 active 클래스 제어 (물품관리는 드롭다운이라 별도 예외처리)
    const mainBtns = ['tab-pe-home', 'tab-pe-inventory-manage', 'tab-pe-paps-manage', 'tab-pe-sports-manage', 'tab-pe-lunch-manage', 'tab-pe-board-manage'];
    mainBtns.forEach(b => { const btn = document.getElementById(b); if(btn) btn.classList.remove('active'); });

    const targetC = document.getElementById('content-' + peTabName); if(targetC) targetC.classList.remove('hidden');
    
    // 부모 탭 Active 처리
    if(peTabName === 'pe-inventory-status' || peTabName === 'pe-purchase-list') {
      document.getElementById('tab-pe-inventory-manage')?.classList.add('active');
    } else {
      document.getElementById('tab-' + peTabName)?.classList.add('active');
    }

    if (peTabName === 'pe-paps-manage') loadAdminGradeStats();
    if (peTabName === 'pe-inventory-status') loadInventory();
    if (peTabName === 'pe-purchase-list') loadPurchaseReqs();
    window.scrollTo(0, 0);
  }

  // =========================================================================
  // ★ 신규: 물품 관리 (Inventory & Purchase) 모듈
  // =========================================================================
  
  // 1. 장소 "직접입력" 시 텍스트 폼 토글
  function toggleCustomLocInput() {
    const sel = document.getElementById('add-inv-loc');
    const custom = document.getElementById('add-inv-custom-loc');
    if (sel.value === '직접입력') {
      custom.classList.remove('hidden');
      custom.focus();
    } else {
      custom.classList.add('hidden');
      custom.value = '';
    }
  }

  // 2. 신규 체육물품 등록
  function addInventoryItem() {
    let loc = document.getElementById('add-inv-loc').value;
    if(loc === '직접입력') {
      loc = document.getElementById('add-inv-custom-loc').value.trim();
    }
    const name = document.getElementById('add-inv-name').value.trim();
    const spec = document.getElementById('add-inv-spec').value.trim();
    const qty = document.getElementById('add-inv-qty').value;
    
    if(!loc || !name || !qty) { showAlert("장소, 물품명, 수량을 모두 입력하세요."); return; }
    
    const btn = document.querySelector('#content-pe-inventory-status .btn-primary');
    btn.disabled = true; btn.innerText = "등록 중...";
    
    google.script.run.withSuccessHandler(function(res) {
      btn.disabled = false; btn.innerText = "등록";
      if(res.success) {
        document.getElementById('add-inv-name').value = '';
        document.getElementById('add-inv-spec').value = '';
        document.getElementById('add-inv-qty').value = '';
        showAlert("물품이 등록되었습니다.");
        loadInventory(); // 등록 성공 시 즉시 목록 새로고침
      } else { showAlert(res.message); }
    }).saveInventoryItem(loc, name, spec, qty);
  }

  // 3. 체육물품 현황 불러오기
  function loadInventory() {
    const loc = document.getElementById('inventory-location-select').value;
    const tbody = document.getElementById('inventory-tbody');
    tbody.innerHTML = '<tr><td colspan="4" style="padding:20px; color:#999;">창고 데이터를 불러오는 중입니다...</td></tr>';
    google.script.run.withSuccessHandler(function(data) {
      tbody.innerHTML = '';
      if(data.length === 0) { tbody.innerHTML = '<tr><td colspan="4" style="padding:20px; color:#999;">해당 장소에 등록된 물품이 없습니다.</td></tr>'; return; }
      data.forEach(item => {
        tbody.innerHTML += `<tr style="border-bottom:1px solid #eee;"><td style="padding:10px; font-weight:bold; color:#4caf50;">${item.loc}</td><td style="padding:10px; font-weight:bold;">${item.name}</td><td style="padding:10px; color:#555;">${item.spec}</td><td style="padding:10px; font-weight:bold; color:#1e3c72;">${item.qty}개</td></tr>`;
      });
    }).getInventoryData(loc);
  }

  // 4. 물품 구입 단가 계산
  function calcReqTotal() {
    const qty = parseInt(document.getElementById('req-qty').value) || 0;
    const price = parseInt(document.getElementById('req-price').value) || 0;
    const totalInput = document.getElementById('req-total');
    if (qty > 0 && price > 0) { totalInput.value = (qty * price).toLocaleString() + " 원"; } else { totalInput.value = ""; }
  }

  // 5. 물품 구입 신청 제출
  function submitPurchaseReq() {
    const item = document.getElementById('req-item').value.trim();
    const spec = document.getElementById('req-spec').value.trim();
    const qty = parseInt(document.getElementById('req-qty').value) || 0;
    const price = parseInt(document.getElementById('req-price').value) || 0;
    const teacher = document.getElementById('req-teacher').value;
    if(!item || qty <= 0 || price <= 0 || !teacher) { showAlert("내용, 수량, 예상단가, 신청교사를 모두 정확히 입력해주세요."); return; }

    const btn = document.getElementById('btn-submit-req'); btn.disabled = true; btn.innerText = "서버 등록 중...";
    const reqData = { item: item, spec: spec, qty: qty, price: price, total: (qty * price), teacher: teacher };
    
    google.script.run.withSuccessHandler(function(res) {
      btn.disabled = false; btn.innerText = "📝 구입 목록에 추가";
      if(res.success) {
        document.getElementById('req-item').value = ''; document.getElementById('req-spec').value = '';
        document.getElementById('req-qty').value = ''; document.getElementById('req-price').value = '';
        document.getElementById('req-total').value = ''; document.getElementById('req-teacher').value = '';
        showAlert("물품 구입 신청이 추가되었습니다."); loadPurchaseReqs();
      } else { showAlert(res.message); }
    }).savePurchaseRequest(reqData);
  }

  // 6. 물품 구입 신청 리스트 불러오기
  function loadPurchaseReqs() {
    const tbody = document.getElementById('purchase-req-tbody');
    tbody.innerHTML = '<tr><td colspan="7" style="padding:20px; color:#999;">신청 내역을 불러오는 중입니다...</td></tr>';
    google.script.run.withSuccessHandler(function(res) {
      document.getElementById('total-teacher-박정환').innerText = (res.totals['박정환'] || 0).toLocaleString() + "원";
      document.getElementById('total-teacher-문승연').innerText = (res.totals['문승연'] || 0).toLocaleString() + "원";
      document.getElementById('total-teacher-양서경').innerText = (res.totals['양서경'] || 0).toLocaleString() + "원";
      
      tbody.innerHTML = '';
      if(res.list.length === 0) { tbody.innerHTML = '<tr><td colspan="7" style="padding:20px; color:#999;">신청된 물품 내역이 없습니다.</td></tr>'; return; }
      res.list.forEach(item => {
        tbody.innerHTML += `<tr style="border-bottom:1px solid #eee;"><td style="padding:8px; color:#888;">${item[0]}</td><td style="padding:8px; font-weight:bold;">${item[1]}</td><td style="padding:8px; color:#555;">${item[2]}</td><td style="padding:8px;">${item[3]}</td><td style="padding:8px;">${parseInt(item[4]).toLocaleString()}</td><td style="padding:8px; font-weight:bold; color:#d32f2f;">${parseInt(item[5]).toLocaleString()}원</td><td style="padding:8px; font-weight:bold; color:#1e3c72;">${item[6]}</td></tr>`;
      });
    }).getPurchaseRequests();
  }

  // 7. 물품구입명단 엑셀 다운로드 (SheetJS 활용)
  function downloadPurchaseExcel() {
    const table = document.getElementById("purchase-table");
    if(!table) return;
    
    // HTML 테이블 데이터를 엑셀 워크북으로 변환
    const wb = XLSX.utils.table_to_book(table, {sheet: "물품구입명단"});
    
    // 시트 열 너비 자동 조정 세팅 (보기 좋게)
    const ws = wb.Sheets["물품구입명단"];
    if(ws) {
      ws['!cols'] = [
        {wch: 8},  // 순번
        {wch: 25}, // 내용
        {wch: 15}, // 규격
        {wch: 8},  // 수량
        {wch: 15}, // 예상단가
        {wch: 15}, // 예상금액
        {wch: 12}  // 신청교사
      ];
    }
    
    // 엑셀 파일 다운로드 트리거
    const dateStr = new Date().toLocaleDateString().replace(/\./g, '').replace(/ /g, '_');
    XLSX.writeFile(wb, `한영고_체육부_물품구입신청명단_${dateStr}.xlsx`);
  }

  // =========================================================================
  // 회원가입 및 로그인, 그 외 기존 기능 (전부 생략 없이 복원)
  // =========================================================================
  function changeSignupForm() {
    const roleEl = document.querySelector('input[name="reg-role"]:checked'); if (!roleEl) return;
    if(roleEl.value === '교사' || roleEl.value === '체육교사') {
      document.getElementById('signup-student-form')?.classList.add('hidden'); document.getElementById('signup-teacher-form')?.classList.remove('hidden');
    } else {
      document.getElementById('signup-student-form')?.classList.remove('hidden'); document.getElementById('signup-teacher-form')?.classList.add('hidden');
    }
  }

  function checkPasswordMatch() {
    const pw = document.getElementById('reg-pw').value; const confirmPw = document.getElementById('reg-pw-confirm').value;
    const matchText = document.getElementById('pw-match-text'); const mismatchText = document.getElementById('pw-mismatch-text');
    if(!pw || !confirmPw) { if(matchText) matchText.style.display = 'none'; if(mismatchText) mismatchText.style.display = 'none'; return; }
    if(pw === confirmPw) { if(matchText) matchText.style.display = 'block'; if(mismatchText) mismatchText.style.display = 'none'; }
    else { if(matchText) matchText.style.display = 'none'; if(mismatchText) mismatchText.style.display = 'block'; }
  }

  function searchStudent() {
    const g = document.getElementById('reg-grade').value, c = document.getElementById('reg-class').value, n = document.getElementById('reg-num').value;
    if(!g || !c || !n) { showAlert("학년, 반, 번호를 모두 선택하세요."); return; }
    const searchBtn = document.querySelector('#signup-student-form .btn-small'); if(searchBtn) { searchBtn.innerText = "조회 중..."; searchBtn.disabled = true; }
    const nameInput = document.getElementById('reg-student-name'); if(nameInput) nameInput.value = "서버 통신 중...";
    google.script.run.withSuccessHandler(function(res) {
      if(searchBtn) { searchBtn.innerText = "학생 조회"; searchBtn.disabled = false; }
      if(res.success) { if(nameInput) nameInput.value = res.name; verifiedStudentName = res.name; } else { if(nameInput) nameInput.value = ""; showAlert(res.message); }
    }).findStudent(g, c, n);
  }

  function attemptSignup() {
    const roleEl = document.querySelector('input[name="reg-role"]:checked'); if (!roleEl) return;
    const pw = document.getElementById('reg-pw').value; const pwConfirm = document.getElementById('reg-pw-confirm').value;
    if(!pw || pw !== pwConfirm) { showAlert("비밀번호를 정확히 확인해주세요."); return; }
    let finalId, finalName, secretCode;
    if(roleEl.value === '학생') {
      const g = document.getElementById('reg-grade').value, c = document.getElementById('reg-class').value, n = document.getElementById('reg-num').value;
      if(!verifiedStudentName) { showAlert("먼저 학생 조회를 완료해주세요."); return; }
      finalId = g + c.toString().padStart(2, '0') + n.toString().padStart(2, '0'); finalName = verifiedStudentName; secretCode = "";
    } else {
      finalName = document.getElementById('reg-teacher-name').value.trim(); finalId = finalName; secretCode = document.getElementById('reg-secret').value.trim();
      if(!finalName || !secretCode) { showAlert("이름과 코드를 입력하세요."); return; }
    }
    const signupBtn = document.querySelector('#signup-view .btn-primary'); if(signupBtn) { signupBtn.innerText = "가입 처리 중..."; signupBtn.disabled = true; }
    google.script.run.withSuccessHandler(function(res) {
      if(signupBtn) { signupBtn.innerText = "가입하기"; signupBtn.disabled = false; }
      if(res.success) { showAlert(res.message); toggleView('login-view'); } else { showAlert(res.message); }
    }).registerUser(roleEl.value, finalId, pw, finalName, secretCode);
  }

  function attemptLogin() {
    const roleEl = document.querySelector('input[name="login-role"]:checked'); if (!roleEl) return;
    const id = document.getElementById('login-id').value.trim(); const pw = document.getElementById('login-pw').value.trim();
    if(!id || !pw) return;
    const loginBtn = document.querySelector('#login-view .btn-primary'); if(loginBtn) { loginBtn.innerText = "로딩 중..."; loginBtn.disabled = true; }
    google.script.run.withSuccessHandler(function(res) {
      if(loginBtn) { loginBtn.innerText = "로그인"; loginBtn.disabled = false; }
      if(res.success) {
        currentUser = res; toggleView('main-view');
        const msg = document.getElementById('welcome-msg'); if(msg) msg.innerText = `환영합니다, ${res.name} ${res.role === '학생' ? '학생' : '선생님'}!`;
        if (res.role === '체육교사') document.getElementById('tab-pe-teacher')?.classList.remove('hidden');
        else document.getElementById('tab-pe-teacher')?.classList.add('hidden');
        loadBoard(); loadPaps(); switchTab('home'); 
      } else { const lmsg = document.getElementById('login-msg'); if(lmsg) lmsg.innerText = res.message; }
    }).verifyLogin(roleEl.value, id, pw);
  }

  function logout() { currentUser = null; document.getElementById('login-id').value = ''; document.getElementById('login-pw').value = ''; document.getElementById('tab-pe-teacher')?.classList.add('hidden'); toggleView('login-view'); switchTab('home'); }

  function loadBoard() {
    google.script.run.withSuccessHandler(function(data) {
      const container = document.getElementById('home-notice-list'); if(!container) return; container.innerHTML = '';
      if(data.length === 0) { container.innerHTML = '<div style="color:#999; text-align:center; padding:20px;">등록된 공지사항이 없습니다.</div>'; return; }
      data.forEach(item => { container.innerHTML += `<div style="border-bottom: 1px solid #f0f0f0; padding: 15px 0;"><div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;"><div style="font-size:1.15em; font-weight:bold; color:#333;">${item.title}</div><div style="font-size:0.8em; color:white; background:#1e3c72; padding:3px 8px; border-radius:12px;">${item.date}</div></div><div style="color:#555; white-space:pre-wrap; font-size:0.95em; line-height:1.5;">${item.content}</div></div>`; });
    }).getBoardData();
  }

  function submitNotice() {
    const title = document.getElementById('notice-title').value.trim(); const content = document.getElementById('notice-content').value.trim();
    if(!title || !content) { showAlert("제목과 내용을 모두 입력해주세요!"); return; }
    const btn = document.getElementById('btn-submit-notice'); if(btn) { btn.disabled = true; btn.innerText = "서버 등록 중..."; }
    google.script.run.withSuccessHandler(function(res) {
      if(btn) { btn.disabled = false; btn.innerText = "🚀 새 공지사항 학생들에게 띄우기"; }
      if(res.success) { showAlert(res.message); document.getElementById('notice-title').value = ""; document.getElementById('notice-content').value = ""; loadBoard(); } else { showAlert(res.message); }
    }).saveNotice(title, content);
  }

  function randomizeBracket() {
    let classes = ['1반', '2반', '3반', '4반', '5반', '6반', '7반', '8반'];
    for (let i = classes.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [classes[i], classes[j]] = [classes[j], classes[i]]; }
    for (let i = 0; i < 8; i++) { const el = document.getElementById('team-' + (i + 1)); if (el) el.value = classes[i]; }
    showAlert("🎲 대진표 랜덤 뽑기 완료!");
  }

  function saveBracketDraft() {
    const year = document.getElementById('sports-year').value, grade = document.getElementById('sports-grade').value, sport = document.getElementById('sports-type').value;
    let bracketData = []; for(let i=1; i<=8; i++) { const el = document.getElementById('team-' + i); bracketData.push(el ? el.value : ""); }
    const scheduleData = document.getElementById('sports-schedule').value.trim();
    google.script.run.withSuccessHandler(function(res) { showAlert(res.message); }).saveSportsDraft(year, grade, sport, bracketData, scheduleData);
  }

  function publishBracket() {
    showConfirm("🚨 정말로 배포하시겠습니까?<br>학생 화면에 지금 세팅한 대진표가 즉시 공개됩니다!", function() {
      const year = document.getElementById('sports-year').value, grade = document.getElementById('sports-grade').value, sport = document.getElementById('sports-type').value;
      google.script.run.withSuccessHandler(function(res) { showAlert(res.message); }).withFailureHandler(function(err) { showAlert("⚠️ 오류: " + err.message); }).publishSportsData(year, grade, sport);
    });
  }

  function revokeBracket() {
    showConfirm("🛑 배포를 취소하시겠습니까?<br>학생 화면에서 대진표가 즉시 사라집니다.", function() {
      const year = document.getElementById('sports-year').value, grade = document.getElementById('sports-grade').value, sport = document.getElementById('sports-type').value;
      google.script.run.withSuccessHandler(function(res) { showAlert(res.message); }).withFailureHandler(function(err) { showAlert("⚠️ 오류: " + err.message); }).unpublishSportsData(year, grade, sport);
    });
  }

  function loadStudentSportsBracket() {
    const year = document.getElementById('student-sports-year').value, grade = document.getElementById('student-sports-grade').value, sport = document.getElementById('student-sports-type').value;
    const emptyArea = document.getElementById('student-bracket-empty'), displayArea = document.getElementById('student-bracket-area');

  function uploadExcel() {
    const fileInput = document.getElementById('excel-file'), yearSelect = document.getElementById('upload-year-select');
    const targetYear = yearSelect ? yearSelect.value : "2026";
    if(fileInput.files.length === 0) { showAlert("NEIS 엑셀 파일을 선택해주세요."); return; }
    const file = fileInput.files[0], msg = document.getElementById('excel-upload-msg'); msg.innerText = "엑셀 양식을 분석하고 있습니다..."; msg.style.color = "blue";
    const reader = new FileReader();
    reader.onload = function(e) {
      const data = new Uint8Array(e.target.result), workbook = XLSX.read(data, {type: 'array'});
      const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], {header: 1}); 
      let grade = "", cls = "", parsedData = [];
      for(let i = 0; i < json.length; i++) {
        const row = json[i]; if(!row || row.length === 0) continue;
        if(typeof row[0] === 'string' || typeof row[1] === 'string') { const match = ((row[0] || "") + " " + (row[1] || "")).match(/([0-9]+)\s*학년\s*([0-9]+)\s*반/); if(match) { grade = match[1]; cls = match[2]; } }
        if(grade && cls && !isNaN(row[0]) && parseInt(row[0]) > 0 && typeof row[1] === 'string') {
          const num = parseInt(row[0]), name = row[1].trim(), formatNum = (n) => n.toString().padStart(2, '0');
          const correctId = grade + formatNum(cls) + formatNum(num), getVal = (idx) => row[idx] !== undefined ? row[idx] : "";
          parsedData.push([correctId, name, getVal(2), getVal(3), getVal(4), getVal(7), getVal(8), getVal(9), getVal(13), getVal(15), getVal(17), getVal(20), getVal(21), getVal(24), getVal(25), getVal(27), getVal(28), getVal(29), getVal(30)]);
        }
      }
      if(parsedData.length === 0) { msg.innerText = "❌ 학생 데이터를 찾지 못했습니다."; msg.style.color = "red"; return; }
      msg.innerText = `총 ${parsedData.length}명의 데이터를 저장 중입니다...`;
      google.script.run.withSuccessHandler(function(res) { if(res.success) { msg.innerText = "✅ " + res.message; fileInput.value = ""; loadAdminGradeStats(); } else { msg.innerText = "❌ " + res.message; msg.style.color = "red"; } }).saveNeisPapsData(parsedData, targetYear);
    };
    reader.readAsArrayBuffer(file);
  }

  async function uploadPdf() {
    const fileInput = document.getElementById('pdf-file'), files = fileInput.files;
    if(files.length === 0) { showAlert("업로드할 PDF 파일들을 선택해주세요."); return; }
    const msg = document.getElementById('upload-msg'); msg.style.color = "blue"; msg.innerHTML = ""; 
    let successCount = 0, failCount = 0, errorDetails = ""; 
    const uploadSingleFile = (file) => {
      return new Promise((resolve) => {
        if(!file.name.toLowerCase().endsWith('.pdf')) { resolve({success: false, message: "PDF 파일이 아닙니다."}); return; }
        const reader = new FileReader();
        reader.onload = function(e) { const data = e.target.result; google.script.run.withSuccessHandler(res => resolve(res)).withFailureHandler(err => resolve({success: false, message: err.message})).uploadPapsPdf(data, file.name); };
        reader.readAsDataURL(file);
      });
    };
    for(let i = 0; i < files.length; i++) {
      msg.innerText = `업로드 진행 중... (${i + 1} / ${files.length}개) : ${files[i].name}`;
      const res = await uploadSingleFile(files[i]);
      if(res.success) successCount++; else { failCount++; errorDetails += `<br><span style="color:red;">❌ ${files[i].name} 실패: ${res.message}</span>`; }
    }
    msg.innerHTML = `✅ 전체 업로드 완료! (성공: ${successCount}건, 실패: ${failCount}건)` + errorDetails;
    msg.style.color = failCount > 0 ? "red" : "green"; fileInput.value = ""; loadAdminGradeStats();
  }

  function clearPapsFolder() {
    showConfirm("⚠️ 경고: 구글 드라이브 폴더의 모든 PDF 파일이 삭제됩니다.<br>전체 초기화를 진행할까요?", function() {
      const btn = document.getElementById('btn-paps-clear'), msg = document.getElementById('clear-msg');
      btn.disabled = true; btn.innerText = "서버 폴더 청소 중..."; msg.style.color = "#1e3c72"; msg.innerText = "🔄 구글 드라이브 비우는 중...";
      google.script.run.withSuccessHandler(function(res) {
        btn.disabled = false; btn.innerText = "🚨 잘못 올라간 PDF 전체 초기화";
        if(res.success) { msg.style.color = "green"; msg.innerHTML = "✅ " + res.message; } else { msg.style.color = "red"; msg.innerText = "❌ " + res.message; }
      }).withFailureHandler(err => { btn.disabled = false; btn.innerText = "🚨 잘못 올라간 PDF 전체 초기화"; msg.style.color = "red"; msg.innerText = "❌ 오류: " + err.message; }).clearAllPapsPdf();
    });
  }
</script>
