<script>
  // =========================================================================
  // 물품 관리 (Inventory & Purchase) 모듈
  // =========================================================================

  // 1. 장소 "직접입력" 시 텍스트 폼 토글
  function toggleCustomLocInput() {
    const sel = document.getElementById('add-inv-loc');
    const custom = document.getElementById('add-inv-custom-loc');
    if (sel.value === '직접입력') {
      custom.classList.remove('hidden');
      custom.focus();
    } else {
      custom.classList.add('hidden');
      custom.value = '';
    }
  }

  // 2. 신규 체육물품 등록
  function addInventoryItem() {
    let loc = document.getElementById('add-inv-loc').value;
    if(loc === '직접입력') {
      loc = document.getElementById('add-inv-custom-loc').value.trim();
    }
    const name = document.getElementById('add-inv-name').value.trim();
    const spec = document.getElementById('add-inv-spec').value.trim();
    const qty = document.getElementById('add-inv-qty').value;

    if(!loc || !name || !qty) { showAlert("장소, 물품명, 수량을 모두 입력하세요."); return; }

    const btn = document.querySelector('#content-pe-inventory-status .btn-primary');
    btn.disabled = true; btn.innerText = "등록 중...";

    gsRun('saveInventoryItem', loc, name, spec, qty, currentUser.token).then(function(res) {
      btn.disabled = false; btn.innerText = "등록";
      if(res.success) {
        document.getElementById('add-inv-name').value = '';
        document.getElementById('add-inv-spec').value = '';
        document.getElementById('add-inv-qty').value = '';
        showAlert("물품이 등록되었습니다.");
        loadInventory();
      } else { showAlert(res.message); }
    }).catch(function() { btn.disabled = false; btn.innerText = "등록"; });
  }

  // 3. 체육물품 현황 불러오기
  function loadInventory() {
    const loc = document.getElementById('inventory-location-select').value;
    const tbody = document.getElementById('inventory-tbody');
    tbody.innerHTML = '<tr><td colspan="4" style="padding:20px; color:#999;">창고 데이터를 불러오는 중입니다...</td></tr>';
    gsRun('getInventoryData', loc, currentUser.token).then(function(data) {
      tbody.innerHTML = '';
      if(data.length === 0) { tbody.innerHTML = '<tr><td colspan="4" style="padding:20px; color:#999;">해당 장소에 등록된 물품이 없습니다.</td></tr>'; return; }
      data.forEach(item => {
        tbody.innerHTML += `<tr style="border-bottom:1px solid #eee;"><td style="padding:10px; font-weight:bold; color:#4caf50;">${escapeHtml(item.loc)}</td><td style="padding:10px; font-weight:bold;">${escapeHtml(item.name)}</td><td style="padding:10px; color:#555;">${escapeHtml(item.spec)}</td><td style="padding:10px; font-weight:bold; color:#1e3c72;">${escapeHtml(item.qty)}개</td></tr>`;
      });
    });
  }

  // 4. 물품 구입 단가 계산
  function calcReqTotal() {
    const qty = parseInt(document.getElementById('req-qty').value) || 0;
    const price = parseInt(document.getElementById('req-price').value) || 0;
    const totalInput = document.getElementById('req-total');
    if (qty > 0 && price > 0) { totalInput.value = (qty * price).toLocaleString() + " 원"; } else { totalInput.value = ""; }
  }

  // 5. 물품 구입 신청 제출
  function submitPurchaseReq() {
    const item = document.getElementById('req-item').value.trim();
    const spec = document.getElementById('req-spec').value.trim();
    const qty = parseInt(document.getElementById('req-qty').value) || 0;
    const price = parseInt(document.getElementById('req-price').value) || 0;
    const teacher = document.getElementById('req-teacher').value;
    if(!item || qty <= 0 || price <= 0 || !teacher) { showAlert("내용, 수량, 예상단가, 신청교사를 모두 정확히 입력해주세요."); return; }

    const btn = document.getElementById('btn-submit-req'); btn.disabled = true; btn.innerText = "서버 등록 중...";
    const reqData = { item: item, spec: spec, qty: qty, price: price, total: (qty * price), teacher: teacher };

    gsRun('savePurchaseRequest', reqData, currentUser.token).then(function(res) {
      btn.disabled = false; btn.innerText = "📝 구입 목록에 추가";
      if(res.success) {
        document.getElementById('req-item').value = ''; document.getElementById('req-spec').value = '';
        document.getElementById('req-qty').value = ''; document.getElementById('req-price').value = '';
        document.getElementById('req-total').value = ''; document.getElementById('req-teacher').value = '';
        showAlert("물품 구입 신청이 추가되었습니다."); loadPurchaseReqs();
      } else { showAlert(res.message); }
    }).catch(function() { btn.disabled = false; btn.innerText = "📝 구입 목록에 추가"; });
  }

  // 6. 물품 구입 신청 리스트 불러오기
  function loadPurchaseReqs() {
    const tbody = document.getElementById('purchase-req-tbody');
    tbody.innerHTML = '<tr><td colspan="7" style="padding:20px; color:#999;">신청 내역을 불러오는 중입니다...</td></tr>';
    gsRun('getPurchaseRequests', currentUser.token).then(function(res) {
      document.getElementById('total-teacher-박정환').innerText = (res.totals['박정환'] || 0).toLocaleString() + "원";
      document.getElementById('total-teacher-문승연').innerText = (res.totals['문승연'] || 0).toLocaleString() + "원";
      document.getElementById('total-teacher-양서경').innerText = (res.totals['양서경'] || 0).toLocaleString() + "원";

      tbody.innerHTML = '';
      if(res.list.length === 0) { tbody.innerHTML = '<tr><td colspan="7" style="padding:20px; color:#999;">신청된 물품 내역이 없습니다.</td></tr>'; return; }
      res.list.forEach(item => {
        tbody.innerHTML += `<tr style="border-bottom:1px solid #eee;"><td style="padding:8px; color:#888;">${escapeHtml(item[0])}</td><td style="padding:8px; font-weight:bold;">${escapeHtml(item[1])}</td><td style="padding:8px; color:#555;">${escapeHtml(item[2])}</td><td style="padding:8px;">${escapeHtml(item[3])}</td><td style="padding:8px;">${parseInt(item[4]).toLocaleString()}</td><td style="padding:8px; font-weight:bold; color:#d32f2f;">${parseInt(item[5]).toLocaleString()}원</td><td style="padding:8px; font-weight:bold; color:#1e3c72;">${escapeHtml(item[6])}</td></tr>`;
      });
    });
    loadBudgetList();
  }

  // -------------------------------------------------------------------------
  // 7. 예산 관리 - 조회는 체육교사 전체, 등록/삭제는 박정환 선생님 전용
  // -------------------------------------------------------------------------
  function loadBudgetList() {
    const container = document.getElementById('budget-summary-list');
    container.innerHTML = '<div style="color:#999; text-align:center; padding:10px;">불러오는 중입니다...</div>';
    gsRun('getBudgetList', currentUser.token).then(function(res) {
      const regBtn = document.getElementById('btn-budget-register');
      if (res.isManager) regBtn.classList.remove('hidden'); else regBtn.classList.add('hidden');

      if (!res.success) { container.innerHTML = `<div style="color:red; text-align:center; padding:10px;">${escapeHtml(res.message)}</div>`; return; }
      if (res.list.length === 0) { container.innerHTML = '<div style="color:#999; text-align:center; padding:10px;">등록된 예산이 없습니다.</div>'; return; }

      let html = `<table style="width:100%; border-collapse:collapse; text-align:center; font-size:0.9em;"><thead><tr style="background:#c8e6c9; border-bottom:2px solid #a5d6a7;"><th style="padding:8px;">예산 종류</th><th style="padding:8px;">편성금액</th><th style="padding:8px;">사용금액</th><th style="padding:8px;">잔액</th>${res.isManager ? '<th style="padding:8px;">관리</th>' : ''}</tr></thead><tbody>`;
      res.list.forEach(b => {
        html += `<tr style="border-bottom:1px solid #e0e0e0;"><td style="padding:8px; font-weight:bold;">${escapeHtml(b.type)}</td><td style="padding:8px;">${parseInt(b.allocated).toLocaleString()}원</td><td style="padding:8px;">${parseInt(b.used).toLocaleString()}원</td><td style="padding:8px; font-weight:bold; color:#1b5e20;">${parseInt(b.balance).toLocaleString()}원</td>${res.isManager ? `<td style="padding:8px;"><button class="btn-small" style="background:#999; padding:5px 10px; font-size:0.85em;" onclick="removeBudgetItemNow('${escapeHtml(b.id)}')">삭제</button></td>` : ''}</tr>`;
      });
      html += '</tbody></table>';
      container.innerHTML = html;
    });
  }

  function calcBudgetBalance() {
    const allocated = parseInt(document.getElementById('budget-allocated-input').value) || 0;
    const used = parseInt(document.getElementById('budget-used-input').value) || 0;
    document.getElementById('budget-balance-input').value = (allocated - used).toLocaleString() + "원";
  }

  function openBudgetModal() {
    document.getElementById('budget-type-input').value = '';
    document.getElementById('budget-allocated-input').value = '';
    document.getElementById('budget-used-input').value = '';
    document.getElementById('budget-balance-input').value = '';
    document.getElementById('budgetModal').classList.remove('hidden');
  }

  function closeBudgetModal() {
    document.getElementById('budgetModal').classList.add('hidden');
  }

  function submitBudgetItem() {
    const type = document.getElementById('budget-type-input').value.trim();
    const allocated = document.getElementById('budget-allocated-input').value;
    const used = document.getElementById('budget-used-input').value;
    if (!type || allocated === '') { showAlert('예산 종류와 편성금액을 입력하세요.'); return; }
    const btn = document.getElementById('btn-budget-submit'); btn.disabled = true; btn.innerText = '등록 중...';
    gsRun('saveBudgetItem', type, allocated, used || 0, currentUser.token).then(function(res) {
      btn.disabled = false; btn.innerText = '등록';
      showAlert(res.message);
      if (res.success) { closeBudgetModal(); loadBudgetList(); }
    }).catch(function() { btn.disabled = false; btn.innerText = '등록'; });
  }

  function removeBudgetItemNow(budgetId) {
    showConfirm('이 예산 항목을 삭제하시겠습니까?', function() {
      gsRun('removeBudgetItem', budgetId, currentUser.token).then(function(res) { showAlert(res.message); if (res.success) loadBudgetList(); });
    });
  }
</script>
