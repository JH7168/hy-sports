  <style>
    /* 통합 CSS 디자인 영역 */
    @import url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_two@1.0/NanumSquareRound.woff');

    :root {
      --accent: #ff7a00;
      --accent-dark: #e65100;
      --navy: #16305c;
      --navy2: #1e56c9;
    }

    body { font-family: 'NanumSquareRound', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; background-color: #eef1f7; margin: 0; }
    * { box-sizing: border-box; }

    .hero {
      background: linear-gradient(120deg, var(--navy) 0%, var(--navy2) 60%, #2f7bff 100%);
      background-image:
        repeating-linear-gradient(45deg, rgba(255,255,255,0.035) 0px, rgba(255,255,255,0.035) 2px, transparent 2px, transparent 14px),
        linear-gradient(120deg, var(--navy) 0%, var(--navy2) 60%, #2f7bff 100%);
      color: white; padding: 0; box-shadow: 0 4px 18px rgba(22,48,92,0.35); position: relative;
    }

    .header-top { display: flex; justify-content: center; align-items: center; padding: 16px 20px; max-width: 900px; margin: 0 auto; position: relative; }
    .header-title-group { display: flex; align-items: center; gap: 12px; }
    .header-title-group h1 { margin: 0; font-size: 1.5em; letter-spacing: -0.5px; text-shadow: 0 2px 6px rgba(0,0,0,0.25); }
    .school-logo { width: 44px; height: 44px; border-radius: 50%; background: white; padding: 3px; object-fit: contain; box-shadow: 0 0 0 3px rgba(255,122,0,0.35), 0 2px 8px rgba(0,0,0,0.25); transition: transform 0.25s; }
    .header-title-group:hover .school-logo { transform: rotate(-8deg) scale(1.05); }

    .logout-btn { position: absolute; right: 20px; background: rgba(255,255,255,0.08); color: white; border: 1px solid rgba(255,255,255,0.5); padding: 7px 16px; border-radius: 20px; cursor: pointer; font-size: 0.85em; font-weight: bold; transition: 0.2s; }
    .logout-btn:hover { background: var(--accent); border-color: var(--accent); transform: translateY(-1px); }

    .nav-menu { display: flex; flex-wrap: wrap; justify-content: flex-start; background: rgba(0, 0, 0, 0.18); padding: 0 20px; max-width: 900px; margin: 0 auto; overflow-x: visible; }
    .nav-btn { background: transparent; color: rgba(255,255,255,0.75); border: none; padding: 15px 18px; cursor: pointer; font-weight: bold; font-size: 1em; border-radius: 10px 10px 0 0; transition: all 0.2s; white-space: nowrap; position: relative; }
    .nav-btn:hover { color: white; background: rgba(255,255,255,0.12); }
    .nav-btn.active { background: #eef1f7; color: var(--navy); box-shadow: 0 -2px 0 var(--accent) inset; }

    #tab-pe-teacher { margin-left: auto; }

    .pe-hero {
      background: linear-gradient(120deg, #7a4a30 0%, #ab7b66 55%, #d99a68 100%);
      background-image:
        repeating-linear-gradient(45deg, rgba(255,255,255,0.035) 0px, rgba(255,255,255,0.035) 2px, transparent 2px, transparent 14px),
        linear-gradient(120deg, #7a4a30 0%, #ab7b66 55%, #d99a68 100%);
      color: white; padding: 0; box-shadow: 0 4px 18px rgba(122,74,48,0.35);
    }
    .pe-nav-menu { display: flex; flex-wrap: wrap; justify-content: flex-start; background: rgba(0, 0, 0, 0.28); padding: 0 20px; max-width: 900px; margin: 0 auto; overflow-x: visible; }
    .pe-nav-btn { background: transparent; color: rgba(255,255,255,0.85); border: none; padding: 15px 18px; cursor: pointer; font-weight: bold; font-size: 1em; border-radius: 10px 10px 0 0; transition: all 0.2s; white-space: nowrap; font-family: 'NanumSquareRound', sans-serif; }
    .pe-nav-btn:hover { color: white; background: rgba(255,255,255,0.18); }
    .pe-nav-btn.active { background: #eef1f7; color: #8c564b; box-shadow: 0 -2px 0 var(--accent) inset; }

    .dropdown { position: relative; display: inline-block; }
    .dropdown-content { display: none; position: absolute; background-color: white; box-shadow: 0 10px 30px rgba(22,48,92,0.22); z-index: 10; border-radius: 10px; overflow: hidden; top: 100%; left: 0; white-space: nowrap; flex-direction: row; border: 1px solid #eef1f7; }
    .dropdown-content button { color: #333; padding: 15px 22px; text-decoration: none; display: inline-block; border: none; background: transparent; text-align: center; cursor: pointer; font-family: 'NanumSquareRound', sans-serif; font-weight: bold; font-size: 0.95em; transition: 0.2s; }
    .dropdown-content button:hover { background-color: #eef1f7; color: var(--navy2); }

    .dropdown:hover .dropdown-content { display: flex; animation: fadeIn 0.2s; }
    .dropdown:hover .nav-btn { color: white; background: rgba(255,255,255,0.1); }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }

    .container { padding: 20px; max-width: 900px; margin: auto; }

    .custom-modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10,15,30,0.65); backdrop-filter: blur(2px); display: flex; justify-content: center; align-items: center; z-index: 9999; }
    .custom-modal-box { background: white; padding: 28px 24px 24px; border-radius: 18px; max-width: 320px; width: 85%; text-align: center; box-shadow: 0 15px 45px rgba(22,48,92,0.35); animation: popIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1); border-top: 5px solid var(--accent); }
    .custom-modal-text { margin-bottom: 22px; font-size: 1.05em; color: #333; line-height: 1.55; word-break: keep-all; }
    .custom-modal-btn { background: linear-gradient(135deg, var(--navy2), var(--navy)); color: white; border: none; padding: 12px 20px; border-radius: 10px; font-size: 1em; font-weight: bold; cursor: pointer; width: 100%; transition: transform 0.15s, box-shadow 0.15s; box-shadow: 0 4px 12px rgba(30,86,201,0.35); }
    .custom-modal-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(30,86,201,0.45); }
    .custom-modal-btn:active { transform: translateY(0) scale(0.97); }
    @keyframes popIn { 0% { transform: scale(0.75); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

    .box-ui { background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 30px rgba(22,48,92,0.12); margin-top: 20px; border-top: 5px solid var(--navy2); }
    .role-selector { display: flex; justify-content: space-between; margin-bottom: 20px; }
    .role-selector label { background: #eef1f7; padding: 10px; border-radius: 10px; flex: 1; text-align: center; margin: 0 5px; cursor: pointer; border: 2px solid transparent; transition: 0.2s; }
    .role-selector label:hover { background: #e3ecff; }
    .role-selector input[type="radio"] { display: none; }
    .role-selector input[type="radio"]:checked + label { border-color: var(--navy2); background: linear-gradient(135deg, #e3ecff, #f0f5ff); color: var(--navy); font-weight: bold; box-shadow: 0 2px 8px rgba(30,86,201,0.2); }
    .input-field { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #d7dce6; border-radius: 10px; font-size: 1.05em; font-family: 'NanumSquareRound', sans-serif; transition: border-color 0.2s, box-shadow 0.2s; }
    .input-field:focus { outline: none; border-color: var(--navy2); box-shadow: 0 0 0 3px rgba(30,86,201,0.15); }
    .input-group { display: flex; gap: 10px; margin-bottom: 10px; }

    .btn-primary { width: 100%; padding: 15px; background: linear-gradient(135deg, var(--navy2), var(--navy)); color: white; border: none; border-radius: 10px; font-size: 1.1em; font-weight: bold; cursor: pointer; margin-top:10px; font-family: 'NanumSquareRound', sans-serif; transition: transform 0.15s, box-shadow 0.15s; box-shadow: 0 4px 14px rgba(30,86,201,0.3); }
    .btn-primary:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(30,86,201,0.4); }
    .btn-primary:active:not(:disabled) { transform: translateY(0) scale(0.98); }
    .btn-primary:disabled { background: #a0aabf; cursor: not-allowed; box-shadow: none; }
    .btn-secondary { width: 100%; padding: 15px; background: #eef1f7; color: #333; border: none; border-radius: 10px; font-size: 1.1em; cursor: pointer; margin-top:10px; font-family: 'NanumSquareRound', sans-serif; transition: 0.2s; }
    .btn-secondary:hover { background: #e3e8f2; }
    .btn-small { padding: 12px; background: linear-gradient(135deg, #66bb6a, #43a047); color: white; border: none; border-radius: 10px; cursor: pointer; white-space: nowrap; font-weight:bold; font-family: 'NanumSquareRound', sans-serif; transition: transform 0.15s, box-shadow 0.15s; box-shadow: 0 3px 10px rgba(67,160,71,0.3); }
    .btn-small:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 5px 14px rgba(67,160,71,0.4); }
    .btn-small:active:not(:disabled) { transform: translateY(0) scale(0.97); }
    .btn-small:disabled { background: #9ece9f; cursor: not-allowed; box-shadow: none; }

    .pw-match { color: #2e7d32; font-size: 0.9em; display: none; margin-top:-5px; margin-bottom:10px; font-weight: bold; }
    .pw-mismatch { color: #d32f2f; font-size: 0.9em; display: none; margin-top:-5px; margin-bottom:10px; font-weight: bold; }
    .card { background: white; border-radius: 14px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 16px rgba(22,48,92,0.08); transition: box-shadow 0.2s, transform 0.2s; }
    .hidden { display: none !important; }

    /* 세로형 토너먼트 라인 그리기 CSS */
    .bracket-line-v { width: 2px; background-color: var(--accent); margin: 0 auto; }
    .bracket-line-h { height: 2px; background-color: var(--accent); }
    .bracket-box { background: white; border: 2px solid var(--accent); border-radius: 8px; padding: 10px; text-align: center; box-shadow: 2px 2px 8px rgba(0,0,0,0.08); font-weight: bold; color: var(--accent-dark); font-size: 1.1em; width: 100px; display: inline-block; }
  </style>
</head>
