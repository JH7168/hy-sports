<script>
  // =========================================================================
  // 점심시간 시설 예약 모듈 (풋살장/체육관/운동장 공용)
  // =========================================================================
  const FACILITY_PREFIX = { FUTSAL: 'futsal', GYM: 'gym', FIELD: 'field' };
  const FACILITY_KOR = { FUTSAL: '풋살장', GYM: '체육관', FIELD: '운동장' };
  const WEEKDAY_LABELS = ['일', '월', '화', '수', '목', '금', '토'];
  const GYM_WEEKDAYS = ['월', '화', '수', '목', '금']; // 토·일은 등교하지 않으므로 배정 대상에서 제외
  let facilitySlotsCache = {};
  let facilitySelectedSlotId = {};
  let gymScheduleCache = {};
  // 학년 매칭(반별 대결) 슬롯 생성 시 기본으로 채워줄 주전/후보 인원수 (종목별 통상 인원 기준, 필요하면 직접 수정 가능)
  const FACILITY_DEFAULT_ROSTER = { FUTSAL: { starter: 5, reserve: 3 }, FIELD: { starter: 11, reserve: 3 }, GYM: { starter: 6, reserve: 2 } };

  // 체육관 요일별 배정 뱃지 - 부서마다 색을 다르게 줘서 한눈에 구분되게 한다.
  const GYM_DAY_STYLE = {
    '축구부': { bg: '#e8f5e9', color: '#2e7d32', icon: '⚽' },
    '농구부': { bg: '#fff3e0', color: '#e65100', icon: '🏀' },
    '배구부': { bg: '#e3f2fd', color: '#1565c0', icon: '🏐' },
    '배드민턴부': { bg: '#f3e5f5', color: '#6a1b9a', icon: '🏸' }
  };
  function gymDayBadge_(text) {
    const label = (text || '').toString().trim() || '자유이용';
    const style = GYM_DAY_STYLE[label] || { bg: '#eceff1', color: '#455a64', icon: '🏟️' };
    return `<span style="display:inline-flex; align-items:center; gap:5px; background:${style.bg}; color:${style.color}; padding:6px 12px; border-radius:20px; font-weight:bold; font-size:0.9em; white-space:nowrap;">${style.icon} ${escapeHtml(label)}</span>`;
  }

  function facilityModeLabel(mode, grade) { return mode === 'GRADE' ? (grade + '학년 매칭') : '자유 팀 경쟁(교사 포함)'; }
  function facilityStatusLabel(status) { return { OPEN: '모집중', DRAWN: '추첨완료', CANCELLED: '취소됨' }[status] || status; }
  function facilityFormatDT(dt) { return (dt || '').toString().replace('T', ' '); }
  function facilityToLocalInputStr_(d) {
    const pad = n => n.toString().padStart(2, '0');
    return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
  }

  // 관리자 화면(풋살장/체육관/운동장)은 구조가 동일하므로 마크업을 3번 중복 작성하지 않고
  // 탭을 열 때마다 이 함수로 골격을 생성한 뒤 데이터를 채워 넣는다.
  function openFacilityAdminTab(facility) {
    const p = FACILITY_PREFIX[facility];
    const kor = FACILITY_KOR[facility];
    const root = document.getElementById(`pe-facility-${p}-root`);
    let html = `<div class="card" style="border-top: 5px solid #00838f; margin-bottom: 20px;">
      <h3 style="margin-top:0; color:#006064;">🥅 ${kor} 예약 슬롯 관리</h3>
      <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(140px,1fr)); gap:10px; background:#f0f2f5; padding:15px; border-radius:8px; margin-bottom:20px;">
        <div><label style="font-size:0.8em; color:#666;">이용일자</label><input type="date" id="${p}-new-date" class="input-field" style="margin:0;" onchange="facilityAutoFillWindow('${facility}')"></div>
        <div><label style="font-size:0.8em; color:#666;">모드</label><select id="${p}-new-mode" class="input-field" style="margin:0;" onchange="facilityToggleGradeSelect('${facility}')"><option value="GRADE">학년별 매칭</option><option value="OPEN">자유 팀 경쟁(교사 포함)</option></select></div>
        <div id="${p}-new-grade-wrap"><label style="font-size:0.8em; color:#666;">대상 학년</label><select id="${p}-new-grade" class="input-field" style="margin:0;"><option value="1">1학년</option><option value="2">2학년</option><option value="3">3학년</option></select></div>
        <div id="${p}-new-starter-wrap"><label style="font-size:0.8em; color:#666;">주전 인원수</label><input type="number" id="${p}-new-starter" class="input-field" value="${FACILITY_DEFAULT_ROSTER[facility].starter}" min="1" style="margin:0;"></div>
        <div id="${p}-new-reserve-wrap"><label style="font-size:0.8em; color:#666;">후보 인원수</label><input type="number" id="${p}-new-reserve" class="input-field" value="${FACILITY_DEFAULT_ROSTER[facility].reserve}" min="0" style="margin:0;"></div>
        <div><label style="font-size:0.8em; color:#666;">신청 시작</label><input type="datetime-local" id="${p}-new-appstart" class="input-field" style="margin:0;"></div>
        <div><label style="font-size:0.8em; color:#666;">신청 마감</label><input type="datetime-local" id="${p}-new-append" class="input-field" style="margin:0;"></div>
        <div><label style="font-size:0.8em; color:#666;">발표 시각</label><input type="datetime-local" id="${p}-new-announce" class="input-field" style="margin:0;"></div>
        <div><label style="font-size:0.8em; color:#666;">선발 팀 수</label><input type="number" id="${p}-new-teamcount" class="input-field" value="2" min="1" style="margin:0;"></div>
      </div>
      <p style="font-size:0.8em; color:#888; margin-top:-12px; margin-bottom:12px;">※ 이용일자를 고르면 "이용일 2일 전 06:00~09:00 신청, 12:00 발표"가 기본값으로 채워집니다. 필요하면 직접 수정하세요. 주전/후보 인원수는 학년별 매칭(반별 대결)일 때만 사용됩니다.</p>
      <button class="btn-primary" onclick="facilityCreateSlot('${facility}')" style="background:#00838f;">➕ 예약 슬롯 생성</button>
    </div>`;

    if (facility === 'GYM') {
      html += `<div class="card" style="border-top: 5px solid #8d6e63; margin-bottom: 20px;">
        <h3 style="margin-top:0; color:#4e342e;">📅 요일별 스포츠클럽 준비일 기본 배정</h3>
        <p style="font-size:0.85em; color:#666; margin-bottom:15px;">기본 세팅은 스포츠클럽대회 준비 학생 전용입니다. 배정 안 된 요일(자유이용)에만 위에서 대회를 열 수 있습니다.</p>
        <div id="gym-schedule-editor"><div style="text-align:center; color:#999; padding:15px;">불러오는 중입니다...</div></div>
      </div>`;
    }

    html += `<div class="card" style="border-top: 5px solid #00838f; margin-bottom: 20px;">
      <h3 style="margin-top:0; color:#006064;">📋 예약 슬롯 목록</h3>
      <div style="overflow-x:auto;">
        <table style="width:100%; border-collapse:collapse; text-align:center; font-size:0.92em;">
          <thead><tr style="background:#e0f7fa; border-bottom:2px solid #ccc;"><th style="padding:8px;">이용일자</th><th style="padding:8px;">모드</th><th style="padding:8px;">신청기간</th><th style="padding:8px;">신청수</th><th style="padding:8px;">상태</th><th style="padding:8px;">관리</th></tr></thead>
          <tbody id="${p}-slot-tbody"><tr><td colspan="6" style="padding:20px; color:#999;">불러오는 중입니다...</td></tr></tbody>
        </table>
      </div>
      <div id="${p}-slot-detail" style="margin-top:20px;"></div>
    </div>

    <div class="card" style="border-top: 5px solid #d32f2f;">
      <h3 style="margin-top:0; color:#b71c1c;">🚨 ${kor} 이용규칙 위반 기록 전체 조회</h3>
      <div id="${p}-admin-violation-list"><div style="text-align:center; color:#999; padding:15px;">불러오는 중입니다...</div></div>
    </div>`;

    root.innerHTML = html;
    loadFacilityAdmin(facility);
    loadFacilityViolationsAdmin(facility);
    if (facility === 'GYM') loadGymScheduleAdmin();
  }

  // -------------------------------------------------------------------------
  // 관리자 - 슬롯 생성/목록
  // -------------------------------------------------------------------------
  function facilityToggleGradeSelect(facility) {
    const p = FACILITY_PREFIX[facility];
    const mode = document.getElementById(`${p}-new-mode`).value;
    const show = mode === 'GRADE' ? 'block' : 'none';
    document.getElementById(`${p}-new-grade-wrap`).style.display = show;
    document.getElementById(`${p}-new-starter-wrap`).style.display = show;
    document.getElementById(`${p}-new-reserve-wrap`).style.display = show;
  }

  // 이용일자를 고르면 "이용일 2일 전 06:00~09:00 신청, 12:00 발표"를 기본값으로 채워준다(수정 가능).
  function facilityAutoFillWindow(facility) {
    const p = FACILITY_PREFIX[facility];
    const dateStr = document.getElementById(`${p}-new-date`).value;
    if (!dateStr) return;
    const base = new Date(dateStr + 'T00:00:00');
    base.setDate(base.getDate() - 2);
    const start = new Date(base); start.setHours(6, 0, 0, 0);
    const end = new Date(base); end.setHours(9, 0, 0, 0);
    const announce = new Date(base); announce.setHours(12, 0, 0, 0);
    document.getElementById(`${p}-new-appstart`).value = facilityToLocalInputStr_(start);
    document.getElementById(`${p}-new-append`).value = facilityToLocalInputStr_(end);
    document.getElementById(`${p}-new-announce`).value = facilityToLocalInputStr_(announce);
    if (facility === 'GYM') facilityWarnIfClubDay_(dateStr);
  }

  // 체육관 슬롯을 만들 때, 그 요일이 이미 스포츠클럽 준비일로 지정돼 있으면 알려준다(막지는 않음).
  function facilityWarnIfClubDay_(dateStr) {
    const d = new Date(dateStr + 'T00:00:00');
    const dayLabel = WEEKDAY_LABELS[d.getDay()];
    const assigned = gymScheduleCache[dayLabel];
    if (assigned) showAlert(`⚠️ ${dateStr}(${dayLabel})은 "${assigned}" 준비일로 지정되어 있습니다.\n필요 시 요일 배정을 확인하고 진행하세요.`);
  }

  function loadFacilityAdmin(facility) {
    const p = FACILITY_PREFIX[facility];
    facilitySelectedSlotId[facility] = null;
    const detail = document.getElementById(`${p}-slot-detail`); if (detail) detail.innerHTML = '';
    const tbody = document.getElementById(`${p}-slot-tbody`);
    tbody.innerHTML = `<tr><td colspan="6" style="padding:20px; color:#999;">불러오는 중입니다...</td></tr>`;
    gsRun('getFacilitySlotsAdmin', facility, currentUser.token).then(function(res) {
      facilitySlotsCache[facility] = res.success ? res.list : [];
      if (facilitySlotsCache[facility].length === 0) { tbody.innerHTML = `<tr><td colspan="6" style="padding:20px; color:#999;">생성된 예약 슬롯이 없습니다. 위에서 새로 만들어보세요.</td></tr>`; return; }
      tbody.innerHTML = '';
      facilitySlotsCache[facility].forEach(s => {
        const statusColor = s.status === 'DRAWN' ? '#2e7d32' : (s.status === 'CANCELLED' ? '#999' : '#00838f');
        tbody.innerHTML += `<tr style="border-bottom:1px solid #eee;"><td style="padding:8px; font-weight:bold;">${escapeHtml(s.date)}</td><td style="padding:8px;">${escapeHtml(facilityModeLabel(s.mode, s.grade))}</td><td style="padding:8px; font-size:0.85em; color:#666;">${escapeHtml(facilityFormatDT(s.appStart))} ~ ${escapeHtml(facilityFormatDT(s.appEnd))}</td><td style="padding:8px;">${s.appCount}팀</td><td style="padding:8px; font-weight:bold; color:${statusColor};">${facilityStatusLabel(s.status)}</td><td style="padding:8px;"><button class="btn-small" style="background:#00838f;" onclick="facilitySelectSlot('${facility}', '${s.id}')">상세관리</button></td></tr>`;
      });
    });
  }

  function facilityCreateSlot(facility) {
    const p = FACILITY_PREFIX[facility];
    const date = document.getElementById(`${p}-new-date`).value;
    const mode = document.getElementById(`${p}-new-mode`).value;
    const grade = document.getElementById(`${p}-new-grade`).value;
    const appStart = document.getElementById(`${p}-new-appstart`).value;
    const appEnd = document.getElementById(`${p}-new-append`).value;
    const announceAt = document.getElementById(`${p}-new-announce`).value;
    const teamCount = document.getElementById(`${p}-new-teamcount`).value;
    const starterCount = document.getElementById(`${p}-new-starter`).value;
    const reserveCount = document.getElementById(`${p}-new-reserve`).value;
    if (!date || !appStart || !appEnd || !announceAt) { showAlert('이용일자, 신청 시작/마감, 발표시각을 모두 입력하세요.'); return; }
    gsRun('createFacilitySlot', facility, date, mode, grade, appStart, appEnd, announceAt, teamCount, starterCount, reserveCount, currentUser.token).then(function(res) {
      showAlert(res.message);
      if (res.success) loadFacilityAdmin(facility);
    });
  }

  // -------------------------------------------------------------------------
  // 관리자 - 슬롯 상세관리(수정/추첨/신청현황/결과수동지정/우천공지)
  // -------------------------------------------------------------------------
  function facilitySelectSlot(facility, slotId) {
    facilitySelectedSlotId[facility] = slotId;
    const p = FACILITY_PREFIX[facility];
    const slot = (facilitySlotsCache[facility] || []).find(s => s.id === slotId);
    if (!slot) return;
    const detail = document.getElementById(`${p}-slot-detail`);
    detail.innerHTML = `<div class="card" style="border-top:4px solid #00838f;">
      <h4 style="margin-top:0; color:#006064;">🛠️ ${escapeHtml(slot.date)} 슬롯 상세관리</h4>
      <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(140px,1fr)); gap:10px; background:#f0f2f5; padding:15px; border-radius:8px; margin-bottom:15px;">
        <div><label style="font-size:0.8em; color:#666;">이용일자</label><input type="date" id="${p}-edit-date" class="input-field" style="margin:0;" value="${escapeHtml(slot.date)}"></div>
        <div><label style="font-size:0.8em; color:#666;">모드</label><select id="${p}-edit-mode" class="input-field" style="margin:0;" onchange="facilityToggleEditGradeSelect('${facility}')"><option value="GRADE" ${slot.mode === 'GRADE' ? 'selected' : ''}>학년별 매칭</option><option value="OPEN" ${slot.mode === 'OPEN' ? 'selected' : ''}>자유 팀 경쟁(교사 포함)</option></select></div>
        <div id="${p}-edit-grade-wrap" style="display:${slot.mode === 'GRADE' ? 'block' : 'none'};"><label style="font-size:0.8em; color:#666;">대상 학년</label><select id="${p}-edit-grade" class="input-field" style="margin:0;"><option value="1" ${slot.grade == 1 ? 'selected' : ''}>1학년</option><option value="2" ${slot.grade == 2 ? 'selected' : ''}>2학년</option><option value="3" ${slot.grade == 3 ? 'selected' : ''}>3학년</option></select></div>
        <div id="${p}-edit-starter-wrap" style="display:${slot.mode === 'GRADE' ? 'block' : 'none'};"><label style="font-size:0.8em; color:#666;">주전 인원수</label><input type="number" id="${p}-edit-starter" class="input-field" style="margin:0;" value="${slot.starterCount || FACILITY_DEFAULT_ROSTER[facility].starter}" min="1"></div>
        <div id="${p}-edit-reserve-wrap" style="display:${slot.mode === 'GRADE' ? 'block' : 'none'};"><label style="font-size:0.8em; color:#666;">후보 인원수</label><input type="number" id="${p}-edit-reserve" class="input-field" style="margin:0;" value="${slot.reserveCount || FACILITY_DEFAULT_ROSTER[facility].reserve}" min="0"></div>
        <div><label style="font-size:0.8em; color:#666;">신청 시작</label><input type="datetime-local" id="${p}-edit-appstart" class="input-field" style="margin:0;" value="${escapeHtml(slot.appStart)}"></div>
        <div><label style="font-size:0.8em; color:#666;">신청 마감</label><input type="datetime-local" id="${p}-edit-append" class="input-field" style="margin:0;" value="${escapeHtml(slot.appEnd)}"></div>
        <div><label style="font-size:0.8em; color:#666;">발표 시각</label><input type="datetime-local" id="${p}-edit-announce" class="input-field" style="margin:0;" value="${escapeHtml(slot.announceAt)}"></div>
        <div><label style="font-size:0.8em; color:#666;">선발 팀 수</label><input type="number" id="${p}-edit-teamcount" class="input-field" style="margin:0;" value="${escapeHtml(slot.teamCount)}" min="1"></div>
      </div>
      <div style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom:20px;">
        <button class="btn-primary" style="flex:1; min-width:120px; background:#00838f;" onclick="facilitySaveSlotEdit('${facility}')">💾 정보 저장</button>
        <button class="btn-primary" style="flex:1; min-width:120px; background:#ff9800;" onclick="facilityDrawSlotNow('${facility}')">🎲 지금 (재)추첨</button>
        <button class="btn-primary" style="flex:1; min-width:120px; background:#607d8b;" onclick="facilityPostRainNotice('${facility}')">🌧️ 우천취소 안내 공지 등록</button>
        <button class="btn-primary" style="flex:1; min-width:120px; background:#fff; color:#d32f2f; border:1px solid #d32f2f;" onclick="facilityCancelSlotNow('${facility}')">🛑 슬롯 취소</button>
      </div>
      <h4 style="color:#006064; margin-bottom:8px;">📥 신청 현황 (팀원 전원 가입확정된 팀만 추첨 대상, 선정팀은 초록색)</h4>
      <div id="${p}-app-list"><div style="text-align:center; color:#999; padding:15px;">불러오는 중입니다...</div></div>
      <button class="btn-primary" style="background:#4a148c; margin-top:15px;" onclick="facilityOverrideResult('${facility}')">✅ 체크한 팀으로 발표 결과 수동 지정</button>
    </div>`;
    facilityLoadApplications(facility, slotId);
  }

  function facilityToggleEditGradeSelect(facility) {
    const p = FACILITY_PREFIX[facility];
    const mode = document.getElementById(`${p}-edit-mode`).value;
    const show = mode === 'GRADE' ? 'block' : 'none';
    document.getElementById(`${p}-edit-grade-wrap`).style.display = show;
    document.getElementById(`${p}-edit-starter-wrap`).style.display = show;
    document.getElementById(`${p}-edit-reserve-wrap`).style.display = show;
  }

  function facilityMemberBadges_(members) {
    return members.map(m => `<span style="display:inline-block; margin:2px 4px 2px 0; padding:2px 8px; border-radius:10px; font-size:0.85em; ${m.confirmed ? 'background:#e8f5e9; color:#2e7d32;' : 'background:#fff3e0; color:#e65100;'}">${m.confirmed ? '✅' : '⏳'} ${escapeHtml(m.name)}</span>`).join('');
  }

  // 학년 매칭(반별 대결) 명단은 주전/후보로 미리 정해서 제출된 확정 명단이라 가입확정 표시가
  // 필요 없으므로, 일반 팀 명단과 다르게 주전/후보로 묶어서 보여준다.
  function facilityGroupedMemberHtml_(members, isGradeSlot) {
    if (!isGradeSlot) return facilityMemberBadges_(members);
    const starters = members.filter(m => m.position === '주전');
    const reserves = members.filter(m => m.position === '후보');
    const badge = m => `<span style="display:inline-block; margin:2px 4px 2px 0; padding:2px 8px; border-radius:10px; font-size:0.85em; background:#e8f5e9; color:#2e7d32;">${escapeHtml(m.name)}</span>`;
    let html = '';
    if (starters.length) html += `<div style="margin-bottom:4px;"><b style="font-size:0.82em; color:#1565c0;">주전</b> ${starters.map(badge).join('')}</div>`;
    if (reserves.length) html += `<div><b style="font-size:0.82em; color:#e65100;">후보</b> ${reserves.map(badge).join('')}</div>`;
    return html || facilityMemberBadges_(members);
  }

  function facilityLoadApplications(facility, slotId) {
    const p = FACILITY_PREFIX[facility];
    const slot = (facilitySlotsCache[facility] || []).find(s => s.id === slotId);
    const isGrade = !!slot && slot.mode === 'GRADE';
    gsRun('getFacilityApplicationsAdmin', facility, slotId, currentUser.token).then(function(res) {
      const container = document.getElementById(`${p}-app-list`);
      if (!container) return;
      if (!res.success || res.list.length === 0) { container.innerHTML = `<div style="text-align:center; color:#999; padding:15px;">신청된 팀이 없습니다.</div>`; return; }

    }

    html += `<div class="card" style="border-top:5px solid #00838f;"><h3 style="margin-top:0; color:#006064;">📝 지금 신청 가능한 예약</h3>`;
    if (res.eligibleOpenSlots.length === 0) {
      html += `<div style="color:#999; text-align:center; padding:10px;">현재 신청 가능한 예약이 없습니다.</div>`;
    } else {
      res.eligibleOpenSlots.forEach(s => {
        const mine = res.myTeams[s.id];
        const isGrade = s.mode === 'GRADE';
        html += `<div style="background:#e0f7fa; border-radius:8px; padding:15px; margin-bottom:12px;"><div style="font-weight:bold; color:#006064;">${escapeHtml(s.date)} 이용 (${escapeHtml(facilityModeLabel(s.mode, s.grade))})</div><div style="font-size:0.85em; color:#666; margin:5px 0 10px;">신청마감: ${escapeHtml(facilityFormatDT(s.appEnd))} · 발표: ${escapeHtml(facilityFormatDT(s.announceAt))}</div>`;
        if (mine) {
          if (isGrade) {
            html += `<div style="background:white; border-radius:6px; padding:10px; font-size:0.92em;">✅ <b>${escapeHtml(mine.teamName)}</b> 명단 제출 완료 (추첨 대상입니다)<br>${facilityGroupedMemberHtml_(mine.members, true)}<button class="btn-small" style="background:#999; margin-top:8px;" onclick="facilityCancelMyTeam('${facility}', '${mine.applicationId}')">신청 취소</button></div>`;
          } else {
            html += `<div style="background:white; border-radius:6px; padding:10px; font-size:0.92em;">✅ 팀명 <b>${escapeHtml(mine.teamName)}</b>으로 신청함 — ${facilityMemberBadges_(mine.members)}<br><span style="font-size:0.85em; color:${mine.complete ? '#2e7d32' : '#e65100'};">${mine.complete ? '전원 가입확정 완료, 추첨 대상입니다.' : '팀원 전원이 가입확정해야 추첨 대상이 됩니다.'}</span>${mine.complete ? '' : `<br><button class="btn-small" style="background:#999; margin-top:8px;" onclick="facilityCancelMyTeam('${facility}', '${mine.applicationId}')">팀 신청 취소</button>`}</div>`;
          }
        } else if (isGrade) {
          html += `<div style="display:flex; flex-direction:column; gap:8px;">`;
          if (currentUser.role === '체육교사') {
            html += `<select class="input-field ${p}-class-num" data-slot="${s.id}" style="margin:0; max-width:150px;"><option value="">반 선택</option>${Array.from({ length: 8 }, (_, i) => i + 1).map(n => `<option value="${n}">${n}반</option>`).join('')}</select>`;
          } else {
            const myClassNum = parseInt(currentUser.id.toString().substr(1, 2), 10);
            html += `<div style="font-weight:bold; color:#006064;">🎗️ ${escapeHtml(s.grade)}학년 ${myClassNum}반 대표로 신청</div>`;
          }
          const starterN = parseInt(s.starterCount, 10) || 0;
          const reserveN = parseInt(s.reserveCount, 10) || 0;
          html += `<div style="font-size:0.8em; color:#1565c0; font-weight:bold; margin-bottom:-4px;">주전 (${starterN}명)</div>`;
          html += `<div style="display:grid; grid-template-columns:repeat(auto-fill, minmax(110px, 1fr)); gap:6px;">${Array.from({ length: starterN }, (_, i) => `<input type="text" class="input-field ${p}-starter-slot" data-slot="${s.id}" data-idx="${i}" placeholder="주전 ${i + 1}번 학번" style="margin:0;">`).join('')}</div>`;
          html += `<div style="font-size:0.8em; color:#e65100; font-weight:bold; margin-bottom:-4px;">후보 (${reserveN}명)</div>`;
          html += `<div style="display:grid; grid-template-columns:repeat(auto-fill, minmax(110px, 1fr)); gap:6px;">${Array.from({ length: reserveN }, (_, i) => `<input type="text" class="input-field ${p}-reserve-slot" data-slot="${s.id}" data-idx="${i}" placeholder="후보 ${i + 1}번 학번" style="margin:0;">`).join('')}</div>`;
          html += `<button class="btn-primary" style="margin:0; background:#00838f;" onclick="facilitySubmitClassTeam('${facility}', '${s.id}')">반 대표 명단 제출하기</button>`;
          html += `<div style="font-size:0.8em; color:#888;">※ 주전 ${starterN}명, 후보 ${reserveN}명 칸을 모두 입력해야 제출할 수 있으며, 제출 즉시 확정됩니다(별도 가입확정 절차 없음).</div>`;
          html += `</div>`;
        } else {
          html += `<div style="display:flex; gap:8px; flex-wrap:wrap;"><input type="text" class="input-field ${p}-team-name" data-slot="${s.id}" placeholder="팀명" style="flex:1; min-width:120px; margin:0;"><textarea class="input-field ${p}-team-members" data-slot="${s.id}" placeholder="초대할 팀원 (학생은 학번, 교사는 이름, 한 줄에 한 명씩)" style="flex:2; min-width:150px; margin:0; height:60px;"></textarea><button class="btn-primary" style="flex:1; min-width:100px; margin:0; background:#00838f;" onclick="facilitySubmitTeam('${facility}', '${s.id}')">팀 신청하기</button></div><div style="font-size:0.8em; color:#888; margin-top:6px;">※ 초대받은 팀원 전원이 각자 로그인해서 가입을 확정해야 신청이 완성됩니다.</div>`;
        }
        html += `</div>`;
      });
    }
    html += `</div>`;

    if (res.upcomingSlots.length > 0) {
      html += `<div class="card" style="border-top:5px solid #00838f;"><h3 style="margin-top:0; color:#006064;">🗓️ 예정된 예약</h3>`;
      res.upcomingSlots.forEach(s => { html += `<div style="padding:8px 0; border-bottom:1px solid #eee; font-size:0.92em;">${escapeHtml(s.date)} 이용 (${escapeHtml(facilityModeLabel(s.mode, s.grade))}) — 신청 시작: ${escapeHtml(facilityFormatDT(s.appStart))}</div>`; });
      html += `</div>`;
    }

    html += `<div class="card" style="border-top:5px solid #00838f;"><h3 style="margin-top:0; color:#006064;">🏆 발표 결과</h3>`;
    if (res.resultSlots.length === 0) {
      html += `<div style="color:#999; text-align:center; padding:10px;">아직 발표된 결과가 없습니다.</div>`;
    } else {
      res.resultSlots.forEach(s => {
        const teams = res.resultDetails[s.id] || [];
        html += `<div style="background:#fff8e1; border-radius:8px; padding:12px 15px; margin-bottom:10px;"><div style="font-weight:bold; color:#e65100;">${escapeHtml(s.date)} 이용 (${escapeHtml(facilityModeLabel(s.mode, s.grade))})</div>`;
        if (teams.length === 0) { html += `<div style="color:#999; font-size:0.9em; margin-top:5px;">전원 확정된 팀이 없어 선정된 팀이 없습니다.</div>`; }
        else { teams.forEach(t => { html += `<div style="margin-top:6px; font-size:0.92em;">🏅 <b>${escapeHtml(t.teamName)}</b> - ${escapeHtml(t.members)}</div>`; }); }
        html += `</div>`;
      });
    }
    html += `</div>`;

    container.innerHTML = html;
  }

  function facilitySubmitTeam(facility, slotId) {
    const p = FACILITY_PREFIX[facility];
    const nameInput = document.querySelector(`.${p}-team-name[data-slot="${slotId}"]`);
    const membersInput = document.querySelector(`.${p}-team-members[data-slot="${slotId}"]`);
    const teamName = nameInput.value.trim();
    const members = membersInput.value.trim();
    if (!teamName || !members) { showAlert('팀명과 초대할 팀원을 입력하세요.'); return; }
    gsRun('createFacilityTeam', facility, slotId, teamName, members, currentUser.token).then(function(res) {
      showAlert(res.message);
      if (res.success) loadFacilityStudentView(facility);
    });
  }

  function facilitySubmitClassTeam(facility, slotId) {
    const p = FACILITY_PREFIX[facility];
    const starterInputs = Array.from(document.querySelectorAll(`.${p}-starter-slot[data-slot="${slotId}"]`));
    const reserveInputs = Array.from(document.querySelectorAll(`.${p}-reserve-slot[data-slot="${slotId}"]`));
    const classSelect = document.querySelector(`.${p}-class-num[data-slot="${slotId}"]`);
    const classNum = classSelect ? classSelect.value : '';
    if (classSelect && !classNum) { showAlert('반을 선택하세요.'); return; }
    if (starterInputs.some(el => !el.value.trim()) || reserveInputs.some(el => !el.value.trim())) { showAlert('주전과 후보 명단 칸을 모두 입력해야 신청할 수 있습니다.'); return; }
    const starters = starterInputs.map(el => el.value.trim()).join('\n');
    const reserves = reserveInputs.map(el => el.value.trim()).join('\n');
    gsRun('createFacilityClassTeam', facility, slotId, classNum, starters, reserves, currentUser.token).then(function(res) {
      showAlert(res.message);
      if (res.success) loadFacilityStudentView(facility);
    });
  }

  function facilityConfirmInvite(facility, applicationId) {
    gsRun('confirmFacilityMembership', facility, applicationId, currentUser.token).then(function(res) {
      showAlert(res.message);
      if (res.success) loadFacilityStudentView(facility);
    });
  }

  function facilityCancelMyTeam(facility, applicationId) {
    showConfirm('내가 만든 팀 신청을 취소하시겠습니까?', function() {
      gsRun('cancelMyFacilityApplication', facility, applicationId, currentUser.token).then(function(res) { showAlert(res.message); if (res.success) loadFacilityStudentView(facility); });
    });
  }

  let facilityMgrViolTarget = {};
  function facilityViolAutoSearchTarget(facility) {
    const p = FACILITY_PREFIX[facility];
    const g = document.getElementById(`${p}-viol-grade`).value, c = document.getElementById(`${p}-viol-class`).value, n = document.getElementById(`${p}-viol-num`).value;
    if (g && c && n) facilityMgrSearchViolationTarget(facility);
  }

  function facilityMgrSearchViolationTarget(facility) {
    const p = FACILITY_PREFIX[facility];
    const g = document.getElementById(`${p}-viol-grade`).value, c = document.getElementById(`${p}-viol-class`).value, n = document.getElementById(`${p}-viol-num`).value;
    const nameInput = document.getElementById(`${p}-viol-name`), addBtn = document.getElementById(`btn-${p}-viol-add`);
    if (!g || !c || !n) { showAlert('학년, 반, 번호를 모두 선택하세요.'); return; }
    nameInput.value = '조회 중...'; addBtn.disabled = true; facilityMgrViolTarget[facility] = null;
    gsRun('findStudent', g, c, n).then(function(res) {
      if (res.success) { nameInput.value = res.name; facilityMgrViolTarget[facility] = g + c.toString().padStart(2, '0') + n.toString().padStart(2, '0'); addBtn.disabled = false; } else { nameInput.value = ''; showAlert(res.message); }
    });
  }

  function facilityTodayDateStr_() {
    const d = new Date();
    return `${d.getFullYear()}-${(d.getMonth() + 1).toString().padStart(2, '0')}-${d.getDate().toString().padStart(2, '0')}`;
  }

  // 연도까지 적으면 번잡하니 "7/21"처럼 월/일만 보여준다.
  function facilityShortDateStr_(iso) {
    const parts = (iso || '').split('-');
    if (parts.length !== 3) return iso;
    return `${parseInt(parts[1], 10)}/${parseInt(parts[2], 10)}`;
  }

  // 위반은 항상 오늘 날짜로만 등록한다(날짜를 골라서 과거/미래로 등록하지 못하게).
  function facilitySubmitViolation(facility) {
    const p = FACILITY_PREFIX[facility];
    const reasonSelect = document.getElementById(`${p}-viol-reason-select`).value;
    const reason = reasonSelect === '직접입력' ? document.getElementById(`${p}-viol-reason-custom`).value.trim() : reasonSelect;
    const place = document.getElementById(`${p}-viol-place`).value;
    const violationDate = facilityTodayDateStr_();
    const target = facilityMgrViolTarget[facility];
    if (!target) { showAlert('학생을 먼저 조회하세요.'); return; }
    if (!place) { showAlert('위반 장소를 선택하세요.'); return; }
    if (!reasonSelect) { showAlert('위반 사유를 선택하세요.'); return; }
    if (reasonSelect === '직접입력' && !reason) { showAlert('직접입력할 사유를 입력하세요.'); return; }
    gsRun('addFacilityViolation', facility, target, reason, violationDate, place, currentUser.token).then(function(res) {
      showAlert(res.message);
      if (res.success) {
        document.getElementById(`${p}-viol-reason-select`).value = '';
        document.getElementById(`${p}-viol-reason-custom`).value = '';
        document.getElementById(`${p}-viol-reason-custom`).classList.add('hidden');
        document.getElementById(`${p}-viol-name`).value = '';
        document.getElementById(`btn-${p}-viol-add`).disabled = true;
        facilityMgrViolTarget[facility] = null;
        loadFacilityViolationsForManager(facility);
      }
    });
  }

  // -------------------------------------------------------------------------
  // 학생/교사 화면 - 점심시간 > 관리 (풋살장/체육관/운동장 위반 관리를 한 탭에서, 시설만 골라서)
  // -------------------------------------------------------------------------
  let lunchManageFacility = 'FUTSAL';

  // 장소 선택이 곧 시설 전환 역할도 겸하므로 라벨(체육관/운동장/풋살장) ↔ 코드(GYM/FIELD/FUTSAL) 변환이 필요하다.
  const FACILITY_KOR_TO_CODE = { '체육관': 'GYM', '운동장': 'FIELD', '풋살장': 'FUTSAL' };

  function renderLunchManagePanelHtml_(facility) {
    const p = FACILITY_PREFIX[facility];
    const todayShort = facilityShortDateStr_(facilityTodayDateStr_());
    const placeOptions = ['GYM', 'FIELD', 'FUTSAL'].map(f => `<option value="${FACILITY_KOR[f]}" ${f === facility ? 'selected' : ''}>${FACILITY_KOR[f]}</option>`).join('');
    return `<div class="card" style="border-top:5px solid #d32f2f;">
      <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px;">
        <h3 style="margin:0; color:#b71c1c;">🚨 ${escapeHtml(FACILITY_KOR[facility])} 이용규칙 위반 관리</h3>
        <button class="btn-primary" id="btn-${p}-viol-add" onclick="facilitySubmitViolation('${facility}')" disabled style="margin:0; width:auto; padding:8px 20px; font-size:0.9em; background:#d32f2f;">등록</button>
      </div>
      <p style="font-size:0.85em; color:#888; margin-top:4px;">체육교사가 지정한 관리학생만 볼 수 있는 화면입니다. 위반은 오늘 날짜로만 등록됩니다.</p>
      <div style="background:#fff3e0; padding:15px; border-radius:8px; margin-bottom:15px;">
        <div style="display:flex; gap:4px; flex-wrap:nowrap; align-items:center; overflow-x:auto;">
          <select id="${p}-viol-grade" class="input-field" style="flex:1.1; min-width:0; margin:0; padding:10px 2px;" onchange="facilityViolAutoSearchTarget('${facility}')"><option value="">학년</option><option value="1">1학년</option><option value="2">2학년</option><option value="3">3학년</option></select>
          <select id="${p}-viol-class" class="input-field" style="flex:0.8; min-width:0; margin:0; padding:10px 2px;" onchange="facilityViolAutoSearchTarget('${facility}')"></select>
          <select id="${p}-viol-num" class="input-field" style="flex:0.9; min-width:0; margin:0; padding:10px 2px;" onchange="facilityViolAutoSearchTarget('${facility}')"></select>
          <input type="text" id="${p}-viol-name" class="input-field" placeholder="이름" readonly style="flex:0.9; min-width:0; margin:0; padding:10px 2px; background:#e8f0fe; text-align:center;">
          <div style="flex:0.7; min-width:0; background:white; border:1px solid #ffcc80; border-radius:8px; padding:10px 2px; text-align:center; font-weight:bold; color:#e65100; white-space:nowrap;">${escapeHtml(todayShort)}</div>
          <select id="${p}-viol-place" class="input-field" style="flex:0.9; min-width:0; margin:0; padding:10px 2px;" onchange="lunchManagePlaceChanged(this.value)">${placeOptions}</select>
          <select id="${p}-viol-reason-select" class="input-field" style="flex:1.5; min-width:0; margin:0;" onchange="facilityToggleViolReasonCustom('${facility}')"><option value="">사유 선택</option><option value="복장">복장</option><option value="음식물">음식물</option><option value="직접입력">직접입력</option></select>
          <input type="text" id="${p}-viol-reason-custom" class="input-field hidden" placeholder="사유 직접 입력" style="flex:1.5; min-width:0; margin:0;">
        </div>
      </div>
      <div id="${p}-mgr-violation-list"></div>
    </div>`;
  }

  function facilityToggleViolReasonCustom(facility) {
    const p = FACILITY_PREFIX[facility];
    const sel = document.getElementById(`${p}-viol-reason-select`);
    const custom = document.getElementById(`${p}-viol-reason-custom`);
    if (!sel || !custom) return;
    if (sel.value === '직접입력') { custom.classList.remove('hidden'); custom.focus(); } else { custom.classList.add('hidden'); custom.value = ''; }
  }

  // 장소 선택 드롭다운이 이제 시설 전환 역할을 겸한다(위에 있던 체육관/운동장/풋살장 버튼 대체).
  function lunchManagePlaceChanged(label) {
    const facility = FACILITY_KOR_TO_CODE[label];
    if (facility) loadLunchManageView(facility);
  }

  function loadLunchManageView(facility) {
    if (facility) lunchManageFacility = facility;
    const container = document.getElementById('lunch-manage-container');
    container.innerHTML = renderLunchManagePanelHtml_(lunchManageFacility);
    const p = FACILITY_PREFIX[lunchManageFacility];
    const classSel = document.getElementById(`${p}-viol-class`), numSel = document.getElementById(`${p}-viol-num`);
    if (classSel) { for (let i = 1; i <= 8; i++) classSel.innerHTML += `<option value="${i}">${i}반</option>`; }
    if (numSel) { for (let i = 1; i <= 25; i++) numSel.innerHTML += `<option value="${i}">${i}번</option>`; }
    loadFacilityViolationsForManager(lunchManageFacility);
  }

  // 관리학생은 시설 구분 없이 지정되므로, 아래 표에는 현재 선택된 시설뿐 아니라
  // 풋살장/체육관/운동장 전체 위반 기록이 함께 보여야 한다.
  function loadFacilityViolationsForManager(facility) {
    const p = FACILITY_PREFIX[facility];
    document.getElementById(`${p}-mgr-violation-list`).innerHTML = `<div style="text-align:center; color:#999; padding:15px;">불러오는 중입니다...</div>`;
    gsRun('getAllFacilityViolations', currentUser.token).then(function(res) { facilityRenderAllViolationList_(`${p}-mgr-violation-list`, res); });
  }

  // -------------------------------------------------------------------------
  // 관리자 - 반별 체육부장 지정 (풋살장/체육관/운동장 공용, 학년 매칭 슬롯 대표 신청용)
  // -------------------------------------------------------------------------
  let classLeaderVerified = null; // { grade, classNum, studentId }
  let classLeaderListCache = [];
  let classLeaderVisibleGrade = null; // 현재 펼쳐서 보고 있는 학년 ('1'/'2'/'3'), 없으면 null

  function classLeaderAutoSearchStudent() {
    const g = document.getElementById('classleader-grade').value, c = document.getElementById('classleader-class').value, n = document.getElementById('classleader-num').value;
    if (g && c && n) classLeaderSearchStudent();
  }

  function classLeaderSearchStudent() {
    const g = document.getElementById('classleader-grade').value, c = document.getElementById('classleader-class').value, n = document.getElementById('classleader-num').value;
    const nameInput = document.getElementById('classleader-name'), setBtn = document.getElementById('btn-classleader-set');
    if (!g || !c || !n) { showAlert('학년, 반, 번호를 모두 선택하세요.'); return; }
    nameInput.value = '조회 중...'; setBtn.disabled = true; classLeaderVerified = null;
    gsRun('findStudent', g, c, n).then(function(res) {
      if (res.success) { nameInput.value = res.name; classLeaderVerified = { grade: g, classNum: c, studentId: g + c.toString().padStart(2, '0') + n.toString().padStart(2, '0') }; setBtn.disabled = false; }
      else { nameInput.value = ''; showAlert(res.message); }
    });
  }

  function classLeaderSetNow() {
    if (!classLeaderVerified) return;
    const { grade, classNum, studentId } = classLeaderVerified;
    gsRun('setFacilityClassLeader', grade, classNum, studentId, currentUser.token).then(function(res) {
      showAlert(res.message);
      if (res.success) { document.getElementById('classleader-name').value = ''; document.getElementById('btn-classleader-set').disabled = true; classLeaderVerified = null; loadFacilityClassLeadersAdmin(); }
    });
  }

  function loadFacilityClassLeadersAdmin() {
    const classSel = document.getElementById('classleader-class'), numSel = document.getElementById('classleader-num');
    if (classSel && classSel.options.length <= 1) { for (let i = 1; i <= 8; i++) classSel.innerHTML += `<option value="${i}">${i}반</option>`; }
    if (numSel && numSel.options.length <= 1) { for (let i = 1; i <= 25; i++) numSel.innerHTML += `<option value="${i}">${i}번</option>`; }
    document.getElementById('classleader-name').value = '';
    document.getElementById('btn-classleader-set').disabled = true;
    classLeaderVerified = null;

    gsRun('getFacilityClassLeaders', currentUser.token).then(function(res) {
      classLeaderListCache = res.success ? res.list : [];
      if (classLeaderVisibleGrade) renderClassLeaderTable_(classLeaderVisibleGrade);
    });
  }

  function renderClassLeaderTable_(grade) {
    const tbody = document.getElementById('classleader-tbody');
    const filtered = classLeaderListCache.filter(cl => cl.grade.toString() === grade.toString());
    if (filtered.length === 0) { tbody.innerHTML = `<tr><td colspan="5" style="padding:20px; color:#999;">지정된 체육부장이 없습니다.</td></tr>`; return; }
    tbody.innerHTML = filtered.map(cl => `<tr style="border-bottom:1px solid #eee;"><td style="padding:8px;">${escapeHtml(cl.grade)}학년</td><td style="padding:8px;">${escapeHtml(cl.classNum)}반</td><td style="padding:8px; font-weight:bold;">${escapeHtml(cl.name)}</td><td style="padding:8px;">${escapeHtml(cl.id)}</td><td style="padding:8px;"><button class="btn-small" style="background:#d32f2f;" onclick="classLeaderRemoveNow('${escapeHtml(cl.grade)}','${escapeHtml(cl.classNum)}')">해제</button></td></tr>`).join('');
  }

  function classLeaderRemoveNow(grade, classNum) {
    showConfirm('이 반의 체육부장 지정을 해제하시겠습니까?', function() {
      gsRun('removeFacilityClassLeader', grade, classNum, currentUser.token).then(function(res) { showAlert(res.message); if (res.success) loadFacilityClassLeadersAdmin(); });
    });
  }

  // 명단이 길어지면 화면이 늘어지니 기본은 접어두고, 학년별 버튼을 눌렀을 때만 그 학년만 펼친다.
  function toggleClassLeaderList(grade) {
    const wrap = document.getElementById('classleader-list-wrap');
    if (!wrap) return;
    ['1', '2', '3'].forEach(g => { const b = document.getElementById(`btn-classleader-grade-${g}`); if (b) b.style.background = '#999'; });
    if (classLeaderVisibleGrade === grade) {
      wrap.classList.add('hidden');
      classLeaderVisibleGrade = null;
      return;
    }
    classLeaderVisibleGrade = grade;
    document.getElementById(`btn-classleader-grade-${grade}`).style.background = '#00838f';
    wrap.classList.remove('hidden');
    renderClassLeaderTable_(grade);
  }
</script>
